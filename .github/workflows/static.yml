name: Generate Datas

on:
  # Jalankan otomatis setiap 12 jam
  schedule:
    - cron: "0 */12 * * *" 

  # Memungkinkan menjalankan manual dari tab Actions
  workflow_dispatch:

  # Jalankan setiap kali ada push ke main branch
  push:
    branches:
    - main


jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Generates a snake game from a github user contributions graph, output a svg animation at <landing_page_url>/github-contribution-grid-snake.svg
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Drnk-28 # Ganti dengan username-mu jika berbeda
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark


      # Push the content of <build_dir> to a branch
      # The content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/<target_branch>/<file> , or as github page
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output # File ular akan disimpan di branch terpisah bernama 'output'
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
